<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Buboka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Public+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
:root{--papir:#F2F4EC;--gran:#1E3A2F;--falu:#9E3B2F;--kote:#C4A582;--hvit:#FDFDFB;--myr:#DCE5D0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--papir);color:var(--gran);font-family:'Public Sans',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
background-image:radial-gradient(circle at 20% 15%, rgba(196,165,130,.14) 0 2px, transparent 3px),radial-gradient(circle at 80% 70%, rgba(196,165,130,.12) 0 2px, transparent 3px);}
.hytte{text-align:center;max-width:360px;width:100%;}
h1{font-family:'Fraunces',serif;font-size:42px;letter-spacing:-0.01em;margin-bottom:2px;}
.under{font-size:13.5px;margin-bottom:26px;opacity:.9;}
.dor{margin:0 auto 22px;width:150px;height:216px;background:linear-gradient(160deg,#a84334,var(--falu) 55%,#8a3226);border:5px solid var(--gran);border-radius:6px 6px 2px 2px;position:relative;box-shadow:0 8px 0 -3px var(--gran), 0 14px 22px rgba(30,58,47,.25);transition:transform .18s;}
.dor::before,.dor::after{content:'';position:absolute;left:16%;right:16%;border:2.5px solid rgba(30,58,47,.55);border-radius:3px;}
.dor::before{top:11%;height:30%;}
.dor::after{bottom:11%;height:30%;}
.handtak{position:absolute;right:12px;top:50%;width:13px;height:13px;background:var(--gran);border-radius:50%;transform:translateY(-50%);}
.skilt{position:absolute;top:-15px;left:50%;transform:translateX(-50%);background:var(--kote);color:var(--gran);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;padding:3px 10px;border-radius:3px;border:1.5px solid var(--gran);white-space:nowrap;}
.dor.rister{animation:rist .4s;}
@keyframes rist{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
form{display:flex;flex-direction:column;gap:10px;}
input{padding:12px 14px;border:2px solid var(--gran);border-radius:8px;font:inherit;font-size:16px;background:var(--hvit);text-align:center;letter-spacing:.06em;}
input:focus{outline:3px solid var(--falu);outline-offset:1px;}
button{padding:12px;border:2px solid var(--gran);border-radius:8px;background:var(--gran);color:var(--papir);font:inherit;font-size:15.5px;font-weight:600;cursor:pointer;}
button:hover{background:var(--falu);border-color:var(--falu);}
button:disabled{opacity:.6;cursor:wait;}
.feil{color:var(--falu);font-size:13px;min-height:18px;font-weight:600;}
.mono{font-family:'IBM Plex Mono',monospace;font-size:10.5px;opacity:.6;margin-top:22px;}
</style>
</head>
<body>
<div class="hytte">
  <h1>Buboka</h1>
  <p class="under">Skjulte buer i fjellheimen. Bank på med nøkkelordet.</p>
  <div class="dor" id="dor"><span class="skilt">PRIVAT · BUBOKA</span><span class="handtak"></span></div>
  <form id="skjema">
    <input type="password" id="pass" placeholder="Nøkkelord" autocomplete="current-password" autofocus>
    <button type="submit" id="knapp">Kom inn</button>
    <div class="feil" id="feil"></div>
  </form>
  <p class="mono">64 buer &middot; 14 kilder &middot; kryptert med AES-256</p>
</div>

const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function dekrypter(passord){
  const enc = new TextEncoder();
  const nokkelMat = await crypto.subtle.importKey('raw', enc.encode(passord), 'PBKDF2', false, ['deriveKey']);
  const nokkel = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b2u(NYSTE.salt), iterations:NYSTE.iter, hash:'SHA-256'},
    nokkelMat, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const klar = await crypto.subtle.decrypt({name:'AES-GCM', iv:b2u(NYSTE.iv)}, nokkel, b2u(NYSTE.ct));
  return new TextDecoder().decode(klar);
}

async function provAapne(passord, stille){
  const knapp = document.getElementById('knapp');
  knapp.disabled = true; knapp.textContent = 'Låser opp …';
  try{
    const html = await dekrypter(passord);
    sessionStorage.setItem('buboka-nokkel', passord);
    document.open(); document.write(html); document.close();
  }catch(e){
    knapp.disabled = false; knapp.textContent = 'Kom inn';
    if(!stille){
      document.getElementById('feil').textContent = 'Feil nøkkelord – prøv igjen.';
      const dor = document.getElementById('dor');
      dor.classList.remove('rister'); void dor.offsetWidth; dor.classList.add('rister');
    }
  }
}

document.getElementById('skjema').addEventListener('submit', e => {
  e.preventDefault();
  provAapne(document.getElementById('pass').value, false);
});
const husket = sessionStorage.getItem('buboka-nokkel');
if (husket) provAapne(husket, true);
</script>
